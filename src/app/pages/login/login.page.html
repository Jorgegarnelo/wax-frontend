<app-header [isScrolled]="isScrolled"></app-header>

<ion-content [fullscreen]="true" [scrollEvents]="true" (ionScroll)="onScroll($event)">

  <main class="min-h-full pb-20"
    style="background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,119,182,0.22) 0%, transparent 55%),
           radial-gradient(ellipse 60% 60% at 85% 80%, rgba(3,4,94,0.45) 0%, transparent 55%),
           linear-gradient(180deg, #03045E 0%, #010c1a 35%, #000814 100%);
           background-attachment: fixed;">

    <div class="pt-24 px-4 flex items-center justify-center min-h-[calc(100vh-6rem)]">

      <div class="w-full max-w-[23.75rem]">

        <!-- Logo -->
        <div class="text-center mb-8">
          <p class="text-white font-black text-[1.75rem] tracking-[0.4em] mb-1">WAX</p>
          <p class="font-mono text-[0.5625rem] text-white/30 uppercase tracking-[0.2em]">Asturias Surf Analytics</p>
        </div>

        <!-- Card -->
        <div class="rounded-[0.5rem] border border-white/10 shadow-2xl overflow-hidden"
          style="background: rgba(0,8,30,0.7); backdrop-filter: blur(1.125rem);">

          <!-- Tabs -->
          <div class="flex border-b border-white/10" role="tablist">
            <button role="tab"
              [attr.aria-selected]="activeTab === 'login'"
              aria-controls="panel-login"
              (click)="setTab('login')"
              class="flex-1 py-3 font-mono text-[0.6875rem] uppercase tracking-widest transition-all"
              [class]="activeTab === 'login'
                ? 'text-wax-wave border-b-2 border-wax-wave'
                : 'text-white/30 border-b-2 border-transparent hover:text-white/60'">
              Iniciar sesión
            </button>
            <button role="tab"
              [attr.aria-selected]="activeTab === 'register'"
              aria-controls="panel-register"
              (click)="setTab('register')"
              class="flex-1 py-3 font-mono text-[0.6875rem] uppercase tracking-widest transition-all"
              [class]="activeTab === 'register'
                ? 'text-wax-wave border-b-2 border-wax-wave'
                : 'text-white/30 border-b-2 border-transparent hover:text-white/60'">
              Registrarse
            </button>
          </div>

          <div class="p-6">

            <!-- Error global -->
            <div *ngIf="errorMessage" role="alert"
              class="mb-4 px-4 py-3 rounded-[0.25rem] bg-wax-err/10 border border-wax-err/30 font-mono text-[0.625rem] text-wax-err uppercase tracking-wide">
              {{ errorMessage }}
            </div>

            <!-- PANEL LOGIN -->
            <section *ngIf="activeTab === 'login'"
              id="panel-login" role="tabpanel">

              <form [formGroup]="loginForm" (ngSubmit)="onLogin()" novalidate>
                <fieldset class="flex flex-col gap-4 border-none p-0 m-0">
                  <legend class="sr-only">Credenciales de acceso</legend>

                  <div class="flex flex-col gap-1">
                    <label for="login-email"
                      class="font-mono text-[0.5625rem] text-white/40 uppercase tracking-widest">Email</label>
                    <input id="login-email" type="email" formControlName="email"
                      autocomplete="email" placeholder="tu@email.com"
                      [attr.aria-invalid]="isInvalid(loginForm, 'email')"
                      class="w-full px-4 py-2.5 rounded-[0.25rem] border font-mono text-[0.8125rem] text-white placeholder-white/20 outline-none transition-all"
                      [class]="isInvalid(loginForm, 'email')
                        ? 'border-wax-err/50 bg-wax-err/5 focus:border-wax-err'
                        : 'border-white/10 bg-white/5 focus:border-wax-wave'">
                    <p *ngIf="isInvalid(loginForm, 'email')" role="alert"
                      class="font-mono text-[0.5rem] text-wax-err mt-1">Introduce un email válido.</p>
                  </div>

                  <div class="flex flex-col gap-1">
                    <label for="login-password"
                      class="font-mono text-[0.5625rem] text-white/40 uppercase tracking-widest">Contraseña</label>
                    <input id="login-password" type="password" formControlName="password"
                      autocomplete="current-password" placeholder="••••••••"
                      [attr.aria-invalid]="isInvalid(loginForm, 'password')"
                      class="w-full px-4 py-2.5 rounded-[0.25rem] border font-mono text-[0.8125rem] text-white placeholder-white/20 outline-none transition-all"
                      [class]="isInvalid(loginForm, 'password')
                        ? 'border-wax-err/50 bg-wax-err/5 focus:border-wax-err'
                        : 'border-white/10 bg-white/5 focus:border-wax-wave'">
                    <p *ngIf="isInvalid(loginForm, 'password')" role="alert"
                      class="font-mono text-[0.5rem] text-wax-err mt-1">Mínimo 8 caracteres.</p>
                  </div>

                </fieldset>

                <button type="submit" [disabled]="isLoading"
                  class="w-full mt-6 py-3 rounded-[0.25rem] font-mono text-[0.75rem] uppercase tracking-widest transition-all"
                  [class]="isLoading
                    ? 'bg-wax-wave/30 text-white/30 cursor-not-allowed'
                    : 'bg-wax-wave text-[#000814] font-bold hover:bg-[#48CAE4]'">
                  {{ isLoading ? 'Entrando...' : 'Entrar' }}
                </button>
              </form>
            </section>

            <!-- PANEL REGISTER -->
            <section *ngIf="activeTab === 'register'"
              id="panel-register" role="tabpanel">

              <form [formGroup]="registerForm" (ngSubmit)="onRegister()" novalidate>
                <fieldset class="flex flex-col gap-4 border-none p-0 m-0">
                  <legend class="sr-only">Datos de registro</legend>

                  <div class="flex flex-col gap-1">
                    <label for="register-name"
                      class="font-mono text-[0.5625rem] text-white/40 uppercase tracking-widest">Nombre</label>
                    <input id="register-name" type="text" formControlName="name"
                      autocomplete="name" placeholder="Tu nombre"
                      [attr.aria-invalid]="isInvalid(registerForm, 'name')"
                      class="w-full px-4 py-2.5 rounded-[0.25rem] border font-mono text-[0.8125rem] text-white placeholder-white/20 outline-none transition-all"
                      [class]="isInvalid(registerForm, 'name')
                        ? 'border-wax-err/50 bg-wax-err/5 focus:border-wax-err'
                        : 'border-white/10 bg-white/5 focus:border-wax-wave'">
                    <p *ngIf="isInvalid(registerForm, 'name')" role="alert"
                      class="font-mono text-[0.5rem] text-wax-err mt-1">El nombre es obligatorio.</p>
                  </div>

                  <div class="flex flex-col gap-1">
                    <label for="register-email"
                      class="font-mono text-[0.5625rem] text-white/40 uppercase tracking-widest">Email</label>
                    <input id="register-email" type="email" formControlName="email"
                      autocomplete="email" placeholder="tu@email.com"
                      [attr.aria-invalid]="isInvalid(registerForm, 'email')"
                      class="w-full px-4 py-2.5 rounded-[0.25rem] border font-mono text-[0.8125rem] text-white placeholder-white/20 outline-none transition-all"
                      [class]="isInvalid(registerForm, 'email')
                        ? 'border-wax-err/50 bg-wax-err/5 focus:border-wax-err'
                        : 'border-white/10 bg-white/5 focus:border-wax-wave'">
                    <p *ngIf="isInvalid(registerForm, 'email')" role="alert"
                      class="font-mono text-[0.5rem] text-wax-err mt-1">Introduce un email válido.</p>
                  </div>

                  <div class="flex flex-col gap-1">
                    <label for="register-password"
                      class="font-mono text-[0.5625rem] text-white/40 uppercase tracking-widest">Contraseña</label>
                    <input id="register-password" type="password" formControlName="password"
                      autocomplete="new-password" placeholder="Mínimo 8 caracteres"
                      [attr.aria-invalid]="isInvalid(registerForm, 'password')"
                      class="w-full px-4 py-2.5 rounded-[0.25rem] border font-mono text-[0.8125rem] text-white placeholder-white/20 outline-none transition-all"
                      [class]="isInvalid(registerForm, 'password')
                        ? 'border-wax-err/50 bg-wax-err/5 focus:border-wax-err'
                        : 'border-white/10 bg-white/5 focus:border-wax-wave'">
                    <p *ngIf="isInvalid(registerForm, 'password')" role="alert"
                      class="font-mono text-[0.5rem] text-wax-err mt-1">Mínimo 8 caracteres.</p>
                  </div>

                  <div class="flex flex-col gap-1">
                    <label for="register-password-confirm"
                      class="font-mono text-[0.5625rem] text-white/40 uppercase tracking-widest">Confirmar contraseña</label>
                    <input id="register-password-confirm" type="password"
                      formControlName="password_confirmation"
                      autocomplete="new-password" placeholder="Repite la contraseña"
                      [attr.aria-invalid]="registerForm.hasError('passwordMismatch') && registerForm.get('password_confirmation')?.touched"
                      class="w-full px-4 py-2.5 rounded-[0.25rem] border font-mono text-[0.8125rem] text-white placeholder-white/20 outline-none transition-all"
                      [class]="registerForm.hasError('passwordMismatch') && registerForm.get('password_confirmation')?.touched
                        ? 'border-wax-err/50 bg-wax-err/5 focus:border-wax-err'
                        : 'border-white/10 bg-white/5 focus:border-wax-wave'">
                    <p *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('password_confirmation')?.touched"
                      role="alert"
                      class="font-mono text-[0.5rem] text-wax-err mt-1">Las contraseñas no coinciden.</p>
                  </div>

                </fieldset>

                <button type="submit" [disabled]="isLoading"
                  class="w-full mt-6 py-3 rounded-[0.25rem] font-mono text-[0.75rem] uppercase tracking-widest transition-all"
                  [class]="isLoading
                    ? 'bg-wax-wave/30 text-white/30 cursor-not-allowed'
                    : 'bg-wax-wave text-[#000814] font-bold hover:bg-[#48CAE4]'">
                  {{ isLoading ? 'Creando cuenta...' : 'Crear cuenta' }}
                </button>
              </form>
            </section>

          </div>
        </div>

      </div>
    </div>

    <app-footer></app-footer>

  </main>
</ion-content>
