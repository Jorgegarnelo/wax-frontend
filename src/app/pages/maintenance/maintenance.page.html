<ion-content [fullscreen]="true">
  <main class="min-h-screen flex flex-col items-center justify-center px-4 text-center"
    style="background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,119,182,0.22) 0%, transparent 55%),
           radial-gradient(ellipse 60% 60% at 85% 80%, rgba(3,4,94,0.45) 0%, transparent 55%),
           linear-gradient(180deg, #03045E 0%, #010c1a 35%, #000814 100%);">

    <div class="max-w-[28rem] w-full">

      <!-- Logo -->
      <h1 class="text-wax-wave font-black text-[2.5rem] tracking-[0.3em] m-0 mb-8 leading-none"
        style="text-shadow: 0 0 2rem rgba(0,180,216,0.4);">WAX</h1>

      <!-- Icono herramienta -->
      <div class="flex justify-center mb-6" aria-hidden="true">
        <div class="w-16 h-16 rounded-full border border-wax-wave/20 flex items-center justify-center"
          style="background: rgba(0,180,216,0.08);">
          <svg viewBox="0 0 24 24" class="w-8 h-8 text-wax-wave/60" fill="none"
            stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z" />
          </svg>
        </div>
      </div>

      <h2 class="text-white font-bold text-[1.75rem] m-0 mb-3 tracking-tight">
        En mantenimiento
      </h2>
      <p class="text-white/40 font-mono text-[0.875rem] leading-relaxed mb-2">
        Estamos mejorando la app para ofrecerte<br>
        la mejor experiencia posible.
      </p>
      <p class="text-white/25 font-mono text-[0.75rem] mb-8">
        Volvemos enseguida 🤙
      </p>

      <!-- Barra de progreso animada -->
      <div class="w-full h-[0.1875rem] rounded-full mb-8 overflow-hidden"
        style="background: rgba(255,255,255,0.05);">
        <div class="h-full rounded-full animate-pulse"
          style="width: 60%; background: linear-gradient(90deg, #0096C7, #48CAE4);"
          aria-hidden="true">
        </div>
      </div>

      <p class="font-mono text-[0.75rem] text-white/20 tracking-wide">
        Si tienes dudas escríbenos a
        <a href="mailto:hola@wax.surf"
          class="text-wax-wave/50 hover:text-wax-wave transition-colors no-underline">
          hola@wax.surf
        </a>
      </p>
    </div>
  </main>
</ion-content>
