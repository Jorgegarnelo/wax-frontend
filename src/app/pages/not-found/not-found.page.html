<app-header [isScrolled]="false"></app-header>

<ion-content [fullscreen]="true">
  <main class="min-h-screen flex flex-col items-center justify-center px-4 text-center"
    style="background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,119,182,0.22) 0%, transparent 55%),
           radial-gradient(ellipse 60% 60% at 85% 80%, rgba(3,4,94,0.45) 0%, transparent 55%),
           linear-gradient(180deg, #03045E 0%, #010c1a 35%, #000814 100%);">

    <div class="max-w-[28rem] w-full">

      <!-- Código de error -->
      <p class="font-mono text-[6rem] font-black leading-none m-0"
        style="color: rgba(0,180,216,0.15); letter-spacing: -0.05em;">
        404
      </p>

     
      <div class="flex justify-center -mt-6 mb-6" aria-hidden="true">
        <svg viewBox="0 0 36 36" class="w-12 h-12 opacity-60">
          <path fill="#226699" d="M33.398 23.678c-7.562 4.875-20.062-.438-18.375-8.062c1.479-6.684 9.419-4.763 11.225-3.861c1.806.902.713-3.889-3.475-5.327C17.1 4.48 10.156 4.893 7.961 14.678c-1.5 6.687 1.438 16.062 12.719 16.187c11.281.125 12.718-7.187 12.718-7.187z" />
          <path fill="#55ACEE" d="M35.988 25.193c0-2.146-2.754-2.334-4-1.119c-2.994 2.919-7.402 4.012-13.298 2.861c-10.25-2-10.341-14.014-3.333-17.441c3.791-1.854 8.289.341 9.999 1.655c1.488 1.143 4.334 2.66 4.185.752C29.223 7.839 21.262-.86 10.595 4.64C-.071 10.14 0 22.553 0 24.803v7.25C0 34.262 1.814 36 4.023 36h28C34.232 36 36 34.262 36 32.053c0 0-.004-6.854-.012-6.86z" />
        </svg>
      </div>

      <h1 class="text-white font-bold text-[1.75rem] m-0 mb-3 tracking-tight">
        Página no encontrada
      </h1>
      <p class="text-white/40 font-mono text-[0.875rem] leading-relaxed mb-8">
        La página que buscas no existe o fue movida.<br>
        Vuelve al inicio y sigue surfeando.
      </p>

      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a routerLink="/home"
          class="px-6 py-3 rounded-[0.375rem] font-mono text-[0.75rem] uppercase tracking-widest font-bold no-underline transition-all active:scale-[0.98]"
          style="background: linear-gradient(90deg, #0096C7, #48CAE4); color: #000814;">
          Volver al inicio
        </a>
        <a routerLink="/spots"
          class="px-6 py-3 rounded-[0.375rem] font-mono text-[0.75rem] uppercase tracking-widest border border-white/15 text-white/60 hover:border-wax-wave/50 hover:text-wax-wave no-underline transition-all">
          Ver spots
        </a>
      </div>
    </div>

    <app-footer></app-footer>
  </main>
</ion-content>
