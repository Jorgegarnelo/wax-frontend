<app-header [isScrolled]="isScrolled"></app-header>

<ion-content [fullscreen]="true" [scrollEvents]="true" (ionScroll)="onScroll($event)">
  <main class="min-h-full"
    style="background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,119,182,0.22) 0%, transparent 55%),
           radial-gradient(ellipse 60% 60% at 85% 80%, rgba(3,4,94,0.45) 0%, transparent 55%),
           linear-gradient(180deg, #03045E 0%, #010c1a 35%, #000814 100%);
           background-attachment: fixed;">

    <div class="flex items-center justify-center min-h-screen px-4 py-24">
      <div class="w-full max-w-[26rem]">

        <!-- Logo -->
        <header class="text-center mb-8">
          <h1 class="text-wax-wave font-black text-[2.5rem] tracking-[0.3em] m-0 leading-none"
            style="text-shadow: 0 0 2rem rgba(0,180,216,0.4);">WAX</h1>
          <p class="font-mono text-[0.75rem] text-white/40 mt-2 tracking-[0.15em]">
            Nueva contraseña
          </p>
        </header>

        <!-- Card -->
        <div class="rounded-[0.75rem] border border-white/10 overflow-hidden"
          style="background: rgba(0,10,35,0.85); backdrop-filter: blur(1.5rem);">

          <div class="flex items-center gap-3 px-6 py-4 border-b border-white/10">
            <a routerLink="/login"
              class="text-white/40 hover:text-white transition-colors no-underline">←</a>
            <span class="font-semibold text-[0.875rem] text-white/70">
              Restablecer contraseña
            </span>
          </div>

          <div class="p-8">

            <!-- Error -->
            <div *ngIf="errorMessage" role="alert"
              class="mb-6 px-4 py-3 rounded-[0.5rem] border font-mono text-[0.75rem] tracking-wide flex items-center gap-2"
              style="background: rgba(230,57,70,0.08); border-color: rgba(230,57,70,0.3); color: #ff6b78;">
              <span aria-hidden="true">✕</span>
              {{ errorMessage }}
            </div>

            <!-- Éxito -->
            <div *ngIf="successMessage" role="status"
              class="mb-6 px-4 py-3 rounded-[0.5rem] border font-mono text-[0.75rem] tracking-wide flex items-center gap-2"
              style="background: rgba(6,214,160,0.08); border-color: rgba(6,214,160,0.3); color: #06D6A0;">
              <span aria-hidden="true">✓</span>
              {{ successMessage }}
            </div>

            <form *ngIf="!successMessage"
              [formGroup]="resetForm" (ngSubmit)="onReset()" novalidate class="flex flex-col gap-5">

              <div class="flex flex-col gap-2">
                <label for="new-password"
                  class="font-mono text-[0.75rem] text-white/50 uppercase tracking-widest">
                  Nueva contraseña
                </label>
                <input id="new-password"
                  type="password"
                  formControlName="password"
                  autocomplete="new-password"
                  placeholder="Mínimo 8 caracteres"
                  [attr.aria-invalid]="isInvalid('password')"
                  class="w-full px-4 py-3.5 rounded-[0.5rem] border text-[0.9375rem] text-white placeholder-white/20 outline-none transition-all"
                  [class]="isInvalid('password')
                    ? 'border-red-500/40 bg-red-500/5 focus:border-red-400'
                    : 'border-white/10 bg-white/5 focus:border-wax-wave/50 focus:bg-wax-wave/5'">
                <p *ngIf="isInvalid('password')" role="alert"
                  class="font-mono text-[0.75rem] text-red-400">
                  Mínimo 8 caracteres.
                </p>
              </div>

              <div class="flex flex-col gap-2">
                <label for="confirm-password"
                  class="font-mono text-[0.75rem] text-white/50 uppercase tracking-widest">
                  Confirmar contraseña
                </label>
                <input id="confirm-password"
                  type="password"
                  formControlName="password_confirmation"
                  autocomplete="new-password"
                  placeholder="Repite la contraseña"
                  [attr.aria-invalid]="resetForm.hasError('passwordMismatch') && resetForm.get('password_confirmation')?.touched"
                  class="w-full px-4 py-3.5 rounded-[0.5rem] border text-[0.9375rem] text-white placeholder-white/20 outline-none transition-all"
                  [class]="resetForm.hasError('passwordMismatch') && resetForm.get('password_confirmation')?.touched
                    ? 'border-red-500/40 bg-red-500/5 focus:border-red-400'
                    : 'border-white/10 bg-white/5 focus:border-wax-wave/50 focus:bg-wax-wave/5'">
                <p *ngIf="resetForm.hasError('passwordMismatch') && resetForm.get('password_confirmation')?.touched"
                  role="alert" class="font-mono text-[0.75rem] text-red-400">
                  Las contraseñas no coinciden.
                </p>
              </div>

              <button type="submit" [disabled]="isLoading || !!errorMessage && !token"
                class="w-full py-4 rounded-[0.5rem] font-bold text-[0.9375rem] tracking-wide transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed"
                style="background: linear-gradient(90deg, #0096C7, #48CAE4); color: #000814;">
                {{ isLoading ? 'Guardando...' : 'Guardar nueva contraseña' }}
              </button>

            </form>

          </div>
        </div>

        <!-- Pie -->
        <div class="flex items-center justify-center gap-2 mt-6">
          <svg class="w-3 h-3 text-white/20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <p class="font-mono text-[0.75rem] text-white/20 tracking-wide">
            Conexión segura · Tus datos están protegidos
          </p>
        </div>

      </div>
    </div>

    <app-footer></app-footer>
  </main>
</ion-content>
