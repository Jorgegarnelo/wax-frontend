<div class="fixed inset-0 z-[9999] flex items-center justify-center p-4 md:p-12"
  role="dialog"
  aria-modal="true"
  aria-labelledby="alert-modal-title">

  <div class="absolute inset-0 bg-[#000814]/85 backdrop-blur-xl"
    (click)="close()"
    aria-hidden="true"></div>

  <article class="relative w-full max-w-[32rem] z-10 animate-modal">

    <div class="p-[1px] rounded-xl"
      style="background: linear-gradient(135deg, #F4A261, #00B4D8, rgba(255,255,255,0.15));">

      <div class="rounded-xl overflow-hidden bg-[#000814]/95 backdrop-blur-lg">

        <header
          class="flex items-center justify-between px-6 py-4 border-b border-wax-wave/10">
          <div>
            <p
              class="font-mono text-xs text-wax-wave uppercase tracking-widest mb-0.5">Alertas</p>
            <h2 id="alert-modal-title"
              class="text-white font-semibold text-base m-0">
              {{ spotName }}
            </h2>
          </div>
          <button (click)="close()"
            class="w-8 h-8 rounded-full flex items-center justify-center transition-all border border-white/10 hover:bg-wax-err/20 group"
            aria-label="Cerrar modal">
            <span
              class="text-white/50 group-hover:text-wax-err text-sm leading-none"
              aria-hidden="true">✕</span>
          </button>
        </header>

        <section class="p-6 flex flex-col gap-6"
          aria-label="Configurar alerta de condición">

          <p class="font-mono text-xs text-white/50 uppercase tracking-widest">
            Avísame cuando las condiciones sean
          </p>

          <div class="flex flex-col gap-3" role="group"
            aria-label="Seleccionar condición">

            <button (click)="selectCondition('epic')"
              class="w-full px-4 py-3 rounded-sm border font-mono text-xs uppercase tracking-widest transition-all text-left"
              [attr.aria-pressed]="selectedCondition === 'epic'"
              [class]="selectedCondition === 'epic'
                ? 'border-[#06D6A0] bg-[#06D6A0]/10 text-[#06D6A0]'
                : 'border-white/10 bg-white/5 text-white/50 hover:border-[#06D6A0]/40 hover:text-[#06D6A0]/70'">
              Epico — swell mayor de 1.5m y periodo mayor de 10s
            </button>

            <button (click)="selectCondition('good')"
              class="w-full px-4 py-3 rounded-sm border font-mono text-xs uppercase tracking-widest transition-all text-left"
              [attr.aria-pressed]="selectedCondition === 'good'"
              [class]="selectedCondition === 'good'
                ? 'border-[#FFD60A] bg-[#FFD60A]/10 text-[#FFD60A]'
                : 'border-white/10 bg-white/5 text-white/50 hover:border-[#FFD60A]/40 hover:text-[#FFD60A]/70'">
              Bueno — swell mayor de 1m y periodo mayor de 8s
            </button>

            <button (click)="selectCondition('poor')"
              class="w-full px-4 py-3 rounded-sm border font-mono text-xs uppercase tracking-widest transition-all text-left"
              [attr.aria-pressed]="selectedCondition === 'poor'"
              [class]="selectedCondition === 'poor'
                ? 'border-[#E63946] bg-[#E63946]/10 text-[#E63946]'
                : 'border-white/10 bg-white/5 text-white/50 hover:border-[#E63946]/40 hover:text-[#E63946]/70'">
              Flojo — condiciones suaves, ideal para nadar
            </button>

          </div>

          <button (click)="save()" [disabled]="!selectedCondition || isLoading"
            class="w-full py-3.5 rounded-sm font-mono text-xs uppercase tracking-widest transition-all"
            [class]="!selectedCondition || isLoading
              ? 'bg-wax-wave/30 text-white/30 cursor-not-allowed'
              : 'bg-wax-wave text-[#000814] font-black hover:bg-[#48CAE4]'">
            {{ isLoading ? 'Guardando...' : 'Crear alerta' }}
          </button>

        </section>
      </div>
    </div>
  </article>
</div>
