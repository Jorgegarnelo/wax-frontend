<article class="bg-white/[0.03] border border-white/10 rounded-[0.375rem] p-4 flex flex-col gap-3 hover:bg-white/[0.05] transition-all cursor-pointer relative">
  
  <header class="flex items-center justify-between border-b border-white/5 pb-2">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded-full bg-wax-wave/20 flex items-center justify-center text-[0.5rem] text-white font-mono uppercase">
          {{ report.user?.name?.charAt(0) || 'S' }}
        </div>
        <span class="text-white text-[0.75rem] font-semibold">{{ report.user?.name || 'Surfista' }}</span>
      </div>

      <span class="font-mono text-[0.5rem] text-wax-wave/70 uppercase tracking-widest">
        {{ report.spot?.name || '--' }}
      </span>

      <div class="flex gap-3 ml-2 border-l border-white/10 pl-4">
        <span class="font-mono text-[0.65rem] text-wax-wave">{{ report.wave_height }}m</span>
        <span class="font-mono text-[0.65rem]" style="color: #F4A261">{{ report.wind_speed }}kt</span>
      </div>
    </div>

    <div class="flex gap-3">
      <button class="text-[0.6rem] opacity-30 hover:opacity-100 transition-opacity">🚩</button>
      <button class="text-[0.6rem] opacity-30 hover:opacity-100 transition-opacity">🗑️</button>
    </div>
  </header>

  <main class="flex gap-4">
    <div *ngIf="report.photo_url" 
         class="w-[12rem] h-[8rem] flex-shrink-0 rounded-[0.25rem] overflow-hidden border border-white/5 bg-black/20">
      <img [src]="getOptimizedImageUrl(report.photo_url)" 
           class="w-full h-full object-cover transition-transform duration-500 hover:scale-105"
           alt="Reporte">
    </div>

    <div class="flex-1 flex flex-col justify-between py-1">
      <p class="text-white/80 text-[0.85rem] leading-snug">
        {{ report.comment || 'Sin comentario...' }}
      </p>
      
      <footer class="flex justify-end mt-2">
        <time class="font-mono text-[0.5rem] text-white/20 uppercase tracking-tighter">
          {{ report.created_at | date:'dd/MM HH:mm' }}
        </time>
      </footer>
    </div>
  </main>
</article>
