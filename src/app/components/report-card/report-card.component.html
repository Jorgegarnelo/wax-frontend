<article class="bg-white/[0.03] border border-white/10 rounded-[0.375rem] p-4 flex flex-col h-[11rem] hover:bg-white/[0.05] transition-all cursor-pointer relative overflow-hidden group">
  
<header class="flex items-center justify-between mb-3 h-[1.5rem] flex-shrink-0">
  <div class="flex items-center gap-3 min-w-0 flex-1">
    
    <div class="flex items-center gap-2 flex-shrink-0">
      <div class="w-6 h-6 rounded-full bg-wax-wave/20 flex items-center justify-center text-[0.5rem] text-white font-mono uppercase">
        {{ report.user?.name?.charAt(0) || 'S' }}
      </div>
      <span class="text-white text-[0.75rem] font-semibold truncate max-w-[70px]">
        {{ report.user?.name || 'Surfista' }}
      </span>
    </div>

    <div class="flex items-center gap-2 border-l border-white/10 pl-3 min-w-0 flex-1">
      <span class="font-mono text-[0.55rem] text-wax-wave uppercase tracking-widest truncate flex-1 min-w-[50px]">
        {{ report.spot?.name || '--' }}
      </span>
      
      <div class="flex gap-3 flex-shrink-0 bg-white/5 px-2 py-0.5 rounded-sm">
        <span class="font-mono text-[0.7rem] text-wax-wave whitespace-nowrap">
          {{ report.wave_height || '0' }}m
        </span>
        <span class="font-mono text-[0.7rem] text-orange-400 whitespace-nowrap">
          {{ report.wind_speed || '0' }}kt
        </span>
      </div>
    </div>
  </div>
  
  <div class="flex gap-1 flex-shrink-0 ml-2">
    <ion-button fill="clear" class="m-0 h-8 w-8 opacity-60 hover:opacity-100" (click)="$event.stopPropagation(); onDenunciarClick(report.id)">
      <ion-icon slot="icon-only" name="flag-outline" class="text-white text-[1.1rem]"></ion-icon>
    </ion-button>
    
    <ion-button fill="clear" class="m-0 h-8 w-8 opacity-60 hover:opacity-100 hover:text-red-500 transition-all" (click)="$event.stopPropagation(); onBorrarClick(report.id)">
      <ion-icon slot="icon-only" name="trash-outline" class="text-[1.1rem]"></ion-icon>
    </ion-button>
  </div>
</header>

  <main class="flex gap-4 flex-1 min-h-0">
    <div class="w-[10rem] h-full flex-shrink-0 rounded-[0.25rem] overflow-hidden border border-white/5 bg-black/40 flex items-center justify-center">
      <img *ngIf="report.photo_url"
           [src]="getOptimizedImageUrl(report.photo_url)" 
           class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
           alt="Foto">
      <ion-icon *ngIf="!report.photo_url" name="water-outline" class="opacity-10 text-[2rem] text-white"></ion-icon>
    </div>

    <div class="flex-1 flex flex-col justify-between py-1 min-w-0">
      <p class="text-white/70 text-[0.8rem] leading-snug italic line-clamp-4">
        {{ report.comment || 'Sin comentario...' }}
      </p>
      
      <footer class="flex justify-end mt-auto">
        <time class="font-mono text-[0.55rem] text-wax-wave uppercase tracking-tighter">
          {{ report.created_at | date:'dd/MM HH:mm' }}
        </time>
      </footer>
    </div>
  </main>
</article>
